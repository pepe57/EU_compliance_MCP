name: Monthly Premium Image Rebuild

# Rebuilds premium Docker images with latest version history data.
# Runs monthly, seeds baseline if first run, then diffs against EUR-Lex.
# Pushes to GHCR as ghcr.io/ansvar-systems/eu-regulations-mcp-premium:YYYY-MM

on:
  schedule:
    # 1st of each month at 04:00 UTC
    - cron: '0 4 1 * *'
  workflow_dispatch:
    inputs:
      seed_baseline:
        description: 'Seed baseline versions (first run only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      with_summaries:
        description: 'Generate AI change summaries (requires ANTHROPIC_API_KEY)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: 'Dry run (no DB writes, no image push)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ansvar-systems/eu-regulations-mcp-premium

jobs:
  ingest-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      changes_found: ${{ steps.ingest.outputs.changes_found }}
      version_tag: ${{ steps.tag.outputs.version_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --ignore-scripts && npm rebuild better-sqlite3

      - name: Build TypeScript
        run: npm run build

      # Step 1: Ensure article_versions table exists
      - name: Apply premium schema
        run: sqlite3 data/regulations.db < scripts/add-article-versions.sql

      # Step 2: Seed baseline if first run or requested
      - name: Seed baseline versions
        env:
          SEED_BASELINE: ${{ inputs.seed_baseline }}
        if: env.SEED_BASELINE == 'true'
        run: npx tsx scripts/ingest-version-history.ts --seed-baseline

      # Step 3: Diff-aware ingestion from EUR-Lex
      - name: Ingest version history
        id: ingest
        env:
          SEED_BASELINE: ${{ inputs.seed_baseline }}
          DRY_RUN: ${{ inputs.dry_run }}
          WITH_SUMMARIES: ${{ inputs.with_summaries }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        if: env.SEED_BASELINE != 'true' && env.DRY_RUN != 'true'
        run: |
          FLAGS=""
          if [ "$WITH_SUMMARIES" = "true" ] && [ -n "$ANTHROPIC_API_KEY" ]; then
            FLAGS="--with-summaries"
          fi

          npx tsx scripts/ingest-version-history.ts $FLAGS 2>&1 | tee ingest_output.txt

          # Check if any new versions were inserted
          if grep -q "New versions inserted: 0" ingest_output.txt; then
            echo "changes_found=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "changes_found=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected — will rebuild image"
          fi

      # Step 4: Dry-run mode
      - name: Dry run ingestion
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        if: env.DRY_RUN == 'true'
        run: npx tsx scripts/ingest-version-history.ts --dry-run

      # Step 5: Run tests to verify DB integrity
      - name: Run tests
        run: npm test

      # Step 6: Tag version
      - name: Compute version tag
        id: tag
        run: |
          TAG=$(date +%Y-%m)
          echo "version_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      # Step 7: Commit updated database back to dev
      - name: Commit database changes
        env:
          SEED_BASELINE: ${{ inputs.seed_baseline }}
          VERSION_TAG: ${{ steps.tag.outputs.version_tag }}
        if: steps.ingest.outputs.changes_found == 'true' || env.SEED_BASELINE == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/regulations.db
          git diff --cached --quiet || git commit -m "data: update article_versions from EUR-Lex ($VERSION_TAG)

          Monthly premium rebuild — version history refreshed.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push origin dev

      # Step 8: Build and push Docker image
      - name: Log in to GHCR
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        if: env.DRY_RUN != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        if: env.DRY_RUN != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push premium image
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          VERSION_TAG: ${{ steps.tag.outputs.version_tag }}
        if: env.DRY_RUN != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.premium
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Summary
        env:
          VERSION_TAG: ${{ steps.tag.outputs.version_tag }}
          CHANGES: ${{ steps.ingest.outputs.changes_found }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "## Premium Rebuild Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** \`$VERSION_TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Changes found:** ${CHANGES:-N/A (seed/dry-run)}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dry run:** ${DRY_RUN:-false}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`${REGISTRY}/${IMAGE_NAME}:${VERSION_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
